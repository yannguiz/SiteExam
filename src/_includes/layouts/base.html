 https://bryanlrobinson.com/blog/using-nunjucks-if-expressions-to-create-an-active-navigation-state-in-11ty/
 -->

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/assets/css/global.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <title>{{ title }}</title>
</head>
<body>
    <nav>
        <div class="nav-container">
        <a href="/" class="{{ 'active' if page.url == '/' }}">Home</a>
        <a href="/blog/posts/01-console2025-post/" class="{{ 'active' if '/blog' in page.url }}">Galerie</a>
        <a href="/tag" class="{{ 'active' if '/tag' in page.url }}">Tags</a>
        </div>
    </nav>
    {{ content | safe }}

    {% if page.url != "/" %}
    <footer>
        <div class="gallery">
        {% for post in collections.posts %}
        <div class="gallery-item">
            <a href="{{ post.url }}">
                <model-viewer class="foot"
                    src="{{ post.data.model }}"
                    alt="{{ post.data.title }}"
                    exposure="0.3"
                    camera-orbit="180deg 45deg auto"
                    >
                </model-viewer>
            </a>
        </div>
        {% endfor %}
        </div>
    </footer>
    {% endif %}
</body>
</html>
