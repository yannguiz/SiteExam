<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/assets/css/global.css" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <title>{{ title }}</title>
</head>
<body>
    <nav>
        <div class="nav-container">
        <a href="/" class="{{ 'active' if page.url == '/' }}">Home</a>
        <a href="/blog/posts/01-console2025-post/" class="{{ 'active' if '/blog' in page.url }}">Galerie</a>
        <a href="/tag" class="{{ 'active' if '/tag' in page.url }}">Tags</a>
        </div>
    </nav>
    {{ content | safe }}

    {% if "/blog/posts" not in page.url %}
    <footer class="infos">
    <div class="foot-infos">
    <p class="foot-info">Yann Guizaoui</p> 
    <span class="separateur">|</span>
    <p class="foot-info">2026</p>
    <span class="separateur">|</span>
    <p class="foot-info">HNU6058</p>
    </div>
    </footer>
    {% endif %}
</body>
</html>
