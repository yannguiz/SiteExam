---
layout: layouts/base.html
title: L'Entrepôt 3D
---

<style>

   div.home {
      margin: 2vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Inconsolata", monospace;
      height: 100%;
      box-sizing: border-box;
   }

   h1.website_name {
      color: rgb(255, 255, 255, 0.75);
      font-size: 10vw;
      font-style: normal;
      text-align: center;
      margin: 0;
   }
   h2.author {
      color: rgb(255, 255, 255, 0.75);
      font-size: 3vw;
      font-style: italic;
      text-align: center;
      margin: 0;
      margin-top: 1rem;
   }

   div.gallery-home {
   display: flex;
   margin-top: 5vw;
   flex-wrap: nowrap;
   box-sizing: border-box;
   justify-content: center;
   overflow-x: auto;
   box-sizing: border-box;
   gap: 1vw;
   height: 20vw;
   max-width: 60vw;
   }

   div.gallery-item-home {
   flex-shrink: 0;
   margin: 5px;
   backdrop-filter: blur(5px);
   background: rgba(255, 255, 255, 0.06);
   border: 0.5px solid rgba(255, 255, 255, 0.12);
   max-height: 100%;
   aspect-ratio: 1 / 1;
   }

   div.gallery-item-home:hover {
   background: rgba(53, 50, 50, 0.23);
   }

   div.gallery-item-home model-viewer.home {
   margin: 0;
   width: 100%;
   height: 100%;
   }

   @media (max-width: 768px) {
      h1.website_name {
         font-size: 13vw;
      }
      h2.author {
         font-size: 5vw;
      }

      div.gallery-home {
      margin-top: 20vw;
      height: 45vw;
      max-width: 100%;
      justify-content: flex-start;
      }
   }

</style>


<body class="home">
   <div class="home">
      <h1 class="website_name">{{ title }}</h1>
      <h2 class="author">Yann Guizaoui</h4>
      <div class="gallery-home">
      {% for post in collections.posts %}
         <div class="gallery-item-home">
            <a href="{{ post.url }}">
                  <model-viewer class="home"
                     src="{{ post.data.model }}"
                     alt="{{ post.data.title }}"
                     exposure="0.3"
                     camera-orbit="180deg 45deg auto"
                     >
                  </model-viewer>
            </a>
         </div>
      {% endfor %}
      </div>
   </div>

   <script>
var item = document.querySelector(".gallery-home");
if (item) {
  item.addEventListener("wheel", function(e) {
    item.scrollLeft += e.deltaY;
    e.preventDefault();
  }, { passive: false });
}
</script>
</body>

</html>

<!-- Script de Calvin Guillot :
 https://stackoverflow.com/questions/18481308/set-mouse-wheel-to-horizontal-scroll-using-css/66917534#66917534
 -->

<script>
var item = document.querySelector(".gallery-home");

  window.addEventListener("wheel", function (e) {
    if (e.deltaY > 0) item.scrollLeft += 100;
    else item.scrollLeft -= 100;
    item.style.scrollBehavior = "smooth"; // Ashutosh Baitharu même conversation.
  });
</script>
